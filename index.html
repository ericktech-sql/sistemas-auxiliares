<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erick Tech - Ferramentas e Sistemas</title>
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estilos exclusivos da página inicial */
        .welcome-message {
            text-align: center;
            margin-bottom: 40px;
        }

        .welcome-message h2 {
            font-size: 2.2rem;
            color: #ffffff;
            margin-bottom: 20px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card-link .card {
            text-align: center;
            padding: 30px 20px;
        }

        .card-link .card h3 {
            color: #fff;
            margin: 15px 0 10px;
        }

        .card-link .card p {
            color: #b0b0b0;
        }

        .card-link:hover .card {
            border-color: #46a24a;
        }
    </style>
</head>

<body>
    <header class="banner">
        <h1></h1>
    </header>
    <div id="menu-container"></div>
    <div id="container-index"></div>
    <div id="menu-lateral-container"></div>

    
    </main>

    <footer>
        &copy; 2026 Erick Tech - Todos os direitos reservados.
    </footer>

    <script src="/js/menu-lateral.js"></script>
    <script src="/js/container-index.js"></script>
    <script src="/js/menu.js"></script>
</body>

</html>
