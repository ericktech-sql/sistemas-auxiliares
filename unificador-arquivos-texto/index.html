<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unificador de Arquivos - Erick Tech</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .unifier-card {
            max-width: 800px;
            margin: 0 auto;
        }

        .file-list {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            background: #1e1e2e;
            border-radius: 8px;
            padding: 10px;
            margin: 15px 0;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #333;
            color: #ccc;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .remove-file {
            color: #ff6b6b;
            cursor: pointer;
            font-weight: bold;
        }

        .preview-box {
            background: #1e1e2e;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            white-space: pre-wrap;
            color: #e0e0e0;
        }

        .option-group {
            margin-bottom: 15px;
        }

        .option-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .option-group input[type="text"] {
            padding: 8px 12px;
            background: #2a2a3e;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            width: 100%;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <header class="banner">
        <h1></h1>
    </header>
    <nav>
    <div id="menu-container"></div>
    <div id="menu-lateral-container"></div>

    <main class="container">
        <div class="card unifier-card" style="padding:30px;">
            <h1 style="color:#4CAF50; margin-bottom:20px;"><i class="fas fa-file-merge"></i> Unificador de Arquivos</h1>
            <div class="drop-zone" id="dropZone">
                <div class="upload-icon"><i class="fas fa-file-upload fa-2x"></i></div>
                <h3>Arraste seus arquivos aqui</h3>
                <p>.txt, .sql</p>
                <input type="file" id="fileInput" multiple accept=".txt,.sql" hidden>
                <button class="btn btn-secondary" id="selectBtn" style="margin-top:15px;">
                    <i class="fas fa-folder-open"></i> Selecionar Arquivos
                </button>
            </div>

            <div id="fileSection" style="display:none;">
                <h3 style="margin:20px 0 10px; color:#ccc;">Arquivos Selecionados</h3>
                <ul class="file-list" id="fileList"></ul>
            </div>

            <div class="option-group">
                <label>
                    <input type="checkbox" id="addSeparator" checked>
                    Adicionar separador entre arquivos
                </label>
            </div>
            <div class="option-group">
                <label>
                    <input type="checkbox" id="addFileName">
                    Incluir nome do arquivo no separador
                </label>
            </div>
            <div class="option-group">
                <label>Texto do separador:</label>
                <input type="text" id="separatorText" value="--- {filename} ---">
            </div>
            <div class="option-group">
                <label>Nome do arquivo de saída:</label>
                <input type="text" id="outputFileName" value="arquivo_combinado.txt">
            </div>

            <div id="preview" style="display:none; margin-top:20px;">
                <h3 style="color:#ccc;">Pré-visualização</h3>
                <div class="preview-box" id="previewContent"></div>
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:20px;">
                <button class="btn" id="previewBtn"><i class="fas fa-eye"></i> Pré-visualizar</button>
                <button class="btn" id="mergeBtn"><i class="fas fa-object-group"></i> Juntar Arquivos</button>
                <button class="btn btn-secondary" id="downloadBtn" style="display:none;"><i class="fas fa-download"></i>
                    Baixar</button>
            </div>
            <div id="message" style="margin-top:15px; padding:10px; border-radius:6px; display:none;"></div>
        </div>
    </main>
    <footer>&copy; 2026 Erick Tech</footer>

    <script src="/js/menu-lateral.js"></script>
    <script src="/js/menu.js"></script>
    <script src="script.js"></script>
</body>

</html>
